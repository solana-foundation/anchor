[package]
name = "multisig-pinocchio"
version = "0.1.0"
description = "Raw pinocchio port of the multisig benchmark program"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib", "lib"]
name = "multisig_pinocchio"

[features]
no-entrypoint = []

[dependencies]
pinocchio = { version = "0.11", default-features = false, features = ["copy"] }
pinocchio-system = "0.6"
solana-program-error = "3.0"

[target.'cfg(target_os = "solana")'.dependencies]
solana-define-syscall = "4.0"

[lints.rust.unexpected_cfgs]
level = "allow"

[workspace]
