[package]
name = "quasar-multisig"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "multisig_quasar"

[features]
alloc = []
client = []
debug = []

[dependencies]
quasar-lang = { git = "https://github.com/blueshift-gg/quasar", branch = "feat/dynamic-types-rework" }
solana-address = { version = "2.2.0" }
solana-instruction = { version = "3.2.0" }

[lints.rust.unexpected_cfgs]
level = "allow"

[workspace]

[profile.release]
overflow-checks = false
lto = "fat"
codegen-units = 1
opt-level = 3
[profile.release.build-override]
opt-level = 3
codegen-units = 1
