[package]
# Test-harness wrapper: compiles the nested `program/` SBF crate via build.rs
# and hosts the `anchor debugger` smoke tests. Kept free of `quasar-lang` so
# its dev-dep resolver (litesvm → solana-address 2.6) doesn't clash with
# quasar-lang's own solana-address pin.
name = "vault-quasar-debug"
version = "0.1.0"
edition = "2021"
publish = false
build = "build.rs"

[lib]
path = "src/lib.rs"

[features]
profile = ["anchor-v2-testing/profile"]

[dev-dependencies]
anchor-v2-testing = { path = "../../../../v2-testing" }
litesvm = "0.11"
solana-account = "3.0"
solana-pubkey = "3.0"
solana-instruction = "3.0"

[lints.rust.unexpected_cfgs]
level = "allow"

[workspace]

[profile.release]
overflow-checks = false
lto = "fat"
codegen-units = 1
opt-level = 3
[profile.release.build-override]
opt-level = 3
codegen-units = 1
