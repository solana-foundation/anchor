[package]
name = "vault-v1"
version = "0.1.0"
description = "Anchor v1 port of the quasar-vault benchmark program."
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]
name = "vault_v1"

[features]
no-entrypoint = []
cpi = ["no-entrypoint"]
idl-build = ["anchor-lang/idl-build"]
anchor-debug = []
no-log-ix-name = []
profile = ["anchor-v2-testing/profile"]

[dependencies]
anchor-lang = { path = "../../../../lang" }

[dev-dependencies]
anchor-v2-testing = { path = "../../../../v2-testing" }
litesvm = "0.11"
solana-account = "3.0"
solana-pubkey = "3.0"
