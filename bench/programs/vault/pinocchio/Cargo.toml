[package]
name = "vault-pinocchio"
version = "0.1.0"
description = "Raw pinocchio port of the vault benchmark program."
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib", "lib"]
name = "vault_pinocchio"

[features]
no-entrypoint = []
profile = ["anchor-v2-testing/profile"]

[dependencies]
pinocchio = { version = "0.11", default-features = false, features = ["copy"] }
pinocchio-system = "0.6"
solana-program-error = "3.0"

[dev-dependencies]
anchor-v2-testing = { path = "../../../../v2-testing" }
litesvm = "0.11"
solana-account = "3.0"
solana-pubkey = "3.0"
solana-instruction = "3.0"

[lints.rust.unexpected_cfgs]
level = "allow"

[workspace]

[profile.release]
overflow-checks = false
lto = "fat"
codegen-units = 1
opt-level = 3
[profile.release.build-override]
opt-level = 3
codegen-units = 1
