[package]
name = "hello-world-quasar"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib", "lib"]
name = "hello_world_quasar"

[features]
client = []
debug = []

[dependencies]
# Pinned to the PR branch (blueshift-gg/quasar#181) that re-wires the
# compile-time PDA precomputation for seeded accounts. That optimization
# landed in quasar master as `dd9319e` but was dropped during the IR
# pipeline refactor (`4eebb23`); without it quasar's helloworld runs the
# full runtime PDA find loop (~300 CU) even though its seeds are byte
# literals. Reverting to master masks ~19% of quasar's helloworld CU
# budget and makes the bench unfair.
quasar-lang = { git = "https://github.com/chen-robert/quasar", branch = "notdeghost/const-pda-seeded-accounts" }
solana-program-log = "1.0.0"

[lints.rust.unexpected_cfgs]
level = "allow"

[workspace]

[profile.release]
overflow-checks = false
lto = "fat"
codegen-units = 1
opt-level = 3
[profile.release.build-override]
opt-level = 3
codegen-units = 1
