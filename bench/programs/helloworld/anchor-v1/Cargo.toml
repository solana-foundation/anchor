[package]
name = "hello-world"
version = "0.1.0"
description = "Hello world program used by anchor-bench"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]
name = "hello_world"

[features]
no-entrypoint = []
cpi = ["no-entrypoint"]
idl-build = ["anchor-lang/idl-build"]
anchor-debug = []
no-log-ix-name = []
custom-heap = []
custom-panic = []

[dependencies]
anchor-lang = { path = "../../../../lang" }
