[package]
name = "hello-world-steel"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib", "lib"]
name = "hello_world_steel"

[features]
no-entrypoint = []
profile = ["anchor-v2-testing/profile"]

[dependencies]
steel = "4.0.4"
solana-program = "2.0"
bytemuck = { version = "1", features = ["derive"] }

[dev-dependencies]
anchor-v2-testing = { path = "../../../../v2-testing" }
litesvm = "0.11"
solana-pubkey = "3.0"
solana-instruction = "3.0"
# Force `five8 >= 1.0.0` — solana-keypair 3.1.2 (pulled via litesvm) calls
# an API on `DecodeError` that only exists in the 1.x line. Steel's
# `solana-program = "2.0"` tree otherwise resolves to 0.x.
five8 = "1.0"

[lints.rust.unexpected_cfgs]
level = "allow"

[workspace]

[profile.release]
overflow-checks = false
lto = "fat"
codegen-units = 1
opt-level = 3
[profile.release.build-override]
opt-level = 3
codegen-units = 1
