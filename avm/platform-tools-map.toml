# Static map from Solana release → bundled `platform-tools` version.
#
# Source of truth: `DEFAULT_PLATFORM_TOOLS_VERSION` (or its predecessor, the
# `platform_tools_version = String::from("vX.Y")` literal) in cargo-build-sbf:
#
#   1.18.x : solana-labs/solana, sdk/cargo-build-sbf/src/main.rs
#   2.0.x – 2.3.x : anza-xyz/agave, sdk/cargo-build-sbf/src/main.rs
#                   (then platform-tools-sdk/cargo-build-sbf/src/main.rs from 2.2)
#   3.0.x+ : anza-xyz/agave, platform-tools-sdk/cargo-build-sbf/src/toolchain.rs
#
# Resolution: given a requested Solana version `S`, pick the entry with the
# largest `solana` key that is `<= S`. Entries MUST be ordered by `solana` so
# the resolver can stop at the first key that exceeds the request.
#
# `fallback` is used when the project does not pin a Solana version at all.
# Keep it equal to the platform-tools version of the newest entry below.

fallback = "v1.54"

[[entries]]
solana = "1.18.0"
platform_tools = "v1.39"

[[entries]]
solana = "1.18.8"
platform_tools = "v1.41"

[[entries]]
solana = "2.0.5"
platform_tools = "v1.42"

[[entries]]
solana = "2.1.0"
platform_tools = "v1.43"

[[entries]]
solana = "2.2.1"
platform_tools = "v1.44"

[[entries]]
solana = "2.2.3"
platform_tools = "v1.45"

[[entries]]
solana = "2.2.8"
platform_tools = "v1.46"

[[entries]]
solana = "2.2.11"
platform_tools = "v1.47"

[[entries]]
solana = "2.2.15"
platform_tools = "v1.48"

[[entries]]
solana = "3.0.0"
platform_tools = "v1.51"

[[entries]]
solana = "3.1.1"
platform_tools = "v1.52"

[[entries]]
solana = "4.0.0"
platform_tools = "v1.54"
